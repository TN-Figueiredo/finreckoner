name: CI
on: [push, pull_request]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@tn-figueiredo'
      - run: npm ci
      - run: npm run typecheck
      - run: npm test --if-present
      # Production runtime audit (strict moderate threshold).
      # Dev-tool chain (lhci, playwright, vitest) transitively pulls vulns
      # that do NOT ship to the deployed static site; tracked in ADR 009.
      - run: npm audit --audit-level=moderate --omit=dev
      - run: npm audit --audit-level=high --omit=prod || echo "::warning::Dev-tool vulnerabilities present (non-blocking)"
      - run: chmod +x scripts/*.sh && ./scripts/check-ecosystem-pinning.sh
      - run: ./scripts/check-site-config-immutability.sh
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
      - run: npm run build
      - name: Lighthouse CI
        working-directory: apps/web
        run: npx -y @lhci/cli@0.13.0 autorun
      # Gitleaks action v2 requires GITLEAKS_LICENSE for org repos — run CLI directly instead:
      - name: Secret scan (gitleaks CLI)
        continue-on-error: true
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz -C /tmp
          /tmp/gitleaks detect --source . --no-git --verbose --exit-code=0

  e2e:
    needs: verify
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@tn-figueiredo'
      - run: npm ci
      - run: npx playwright install --with-deps chromium webkit
      - run: npm run build
        working-directory: apps/web
      - run: npm run e2e
        working-directory: apps/web
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/.playwright-report
          retention-days: 7
